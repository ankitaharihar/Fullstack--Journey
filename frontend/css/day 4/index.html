<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>
      “The CSS was not applying because the class selector was defined, but the
      class was not added to the HTML element.”
    </h1>
    <p class="box">
      🔑 Rule to remember (VERY IMPORTANT)<br /><br />

      .box → needs class="box"<br />

      #box → needs id="box"<br />

      p → applies to all
    </p>
  </body>
</html>
