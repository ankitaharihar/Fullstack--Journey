<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Block, Inline and Inline-block</title>
  </head>
  <body>

    <h1>Block Element</h1>
    <p>Block elements start on a new line and take full width.</p>

    <div style="
      background-color: lightblue;
      width: 200px;
      height: 80px;
      text-align: center;
      line-height: 80px;
      display: block;
    ">
      Block Element
    </div>

    <hr>

    <h1>Inline Elements</h1>
    <p>Inline elements stay on the same line and ignore width & height.</p>

    <span style="
      background-color: lightcoral;
      padding: 5px 10px;
      display: inline;
    ">
      Inline 1
    </span>

    <span style="
      background-color: lightcoral;
      padding: 5px 10px;
      display: inline;
    ">
      Inline 2
    </span>

    <hr>

    <h1>Inline-block Elements</h1>
    <p>Inline-block elements stay in line but respect width & height.</p>

    <span style="
      background-color: lightgreen;
      width: 200px;
      height: 100px;
      display: inline-block;
      text-align: center;
      line-height: 100px;
    ">
      Inline-block
    </span>

  </body>
</html>
