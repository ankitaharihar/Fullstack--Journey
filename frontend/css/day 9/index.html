<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Units Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>CSS Units Demo</h1>
    <br />
    <h2 class="unit">Absolute Units</h2>
    <br />
    <div class="box px">PX Box (200px)</div>
    <br />
    <h2 class="unit">Relative Units</h2>
    <br />
    <div class="parent">
      Parent (400px)
      <div class="box percent">50% Box</div>
    </div>
    <br />
    <p class="em-text">em - depends on parent font-size</p>
    <br />
    <p class="rem-text">rem - depends on root (html) font-size</p>

    <br />
    <div class="vh-box">100vh Box</div>
    <br />
    <div class="vw-box">50vw Box</div>
  </body>
</html>
