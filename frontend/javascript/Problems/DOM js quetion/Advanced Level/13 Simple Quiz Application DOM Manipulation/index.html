<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Quiz App</title>
  </head>
  <body>
    <h1>Simple Quiz Application</h1>
    <p id="questionText">What is 2 + 2?</p>
    <div id="optionsWrap">
      <button class="optionBtn" data-answer="3">3</button>
      <button class="optionBtn" data-answer="4">4</button>
      <button class="optionBtn" data-answer="5">5</button>
    </div>
    <p id="resultText"></p>

    <script src="script.js"></script>
  </body>
</html>
